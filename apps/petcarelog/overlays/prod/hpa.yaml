apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: petcarelog-hpa
  namespace: petcarelog-prod
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: petcarelog
  minReplicas: 2
  maxReplicas: 3
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 30

    behavior:
    scaleDown:
      stabilizationWindowSeconds: 60
      policies:
        - type: Pods
          value: 1
          periodSeconds: 30
